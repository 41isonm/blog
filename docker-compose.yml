version: '3.9'

services:
  app:
    build: .
    container_name: laravel_blog
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - mysql
    stdin_open: true
    tty: true

  mysql:
    image: mysql:8.4
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_DATABASE: blog
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
